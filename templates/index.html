<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    color: #333;
    padding: 30px 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    color: #2c3e50;
}

h2 {
    margin-bottom: 15px;
    font-size: 18px;
    color: #2c3e50;
}

/* Form */
form {
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 600px;
    margin: 0 auto 40px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

input, textarea {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
}

input:focus, textarea:focus {
    border-color: #3498db;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background-color: #2980b9;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

th {
    background-color: #3498db;
    color: white;
    padding: 12px 15px;
    text-align: left;
    font-size: 14px;
}

td {
    padding: 11px 15px;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
}

tr:last-child td {
    border-bottom: none;
}

tr:hover td {
    background-color: #f8f9fa;
}

/* Delete link */
a {
    color: #e74c3c;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}
    </style>
</head>
<body>
<form action="/search" method="GET">
    <input type="text" name="query" placeholder="Search customers...">
    <button type="submit">Search</button>
</form>
    <form action="/add" method="post">
        <h2>ADD NEW CUSTOMER</h2>
        <input type="text"  name="name"         placeholder="CUSTOMER NAME" required>
        <input type="email" name="email"        placeholder="EMAIL ADDRESS" required>
        <input type="number"name="phone"        placeholder="PHONE NO." required>
        <textarea name="notes" rows="3"         placeholder="INPUT NOTES" required></textarea>
        <button type="submit">ADD CUSTOMER</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>name</th>
            <th>Email</th>
            <th>number</th>
            <th>notes</th>
            <th>action</th>
        </tr>

            {% for customer in customers %}
            <tr>
                <td>{{ customer[0] }}</td>
                <td>{{ customer[1] }}</td>
                <td>{{ customer[2] }}</td>
                <td>{{ customer[3] }}</td>
                <td>{{ customer[4] }}</td>
                <td><a href="/delete/{{ customer[0] }}">Delete</a></td>
                <td><a href="/edit/{{ customer[0]}}">EDIT</td>
            </tr>
            {% endfor %}
    </table>
    <a href="/logout">Logout</a>
</body>
</html>
