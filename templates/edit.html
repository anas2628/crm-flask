<style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    color: #333;
    padding: 30px 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    color: #2c3e50;
}

h2 {
    margin-bottom: 15px;
    font-size: 18px;
    color: #2c3e50;
}

/* Form */
form {
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 600px;
    margin: 0 auto 40px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

input, textarea {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
}

input:focus, textarea:focus {
    border-color: #3498db;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background-color: #2980b9;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

th {
    background-color: #3498db;
    color: white;
    padding: 12px 15px;
    text-align: left;
    font-size: 14px;
}

td {
    padding: 11px 15px;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
}

tr:last-child td {
    border-bottom: none;
}

tr:hover td {
    background-color: #f8f9fa;
}

/* Delete link */
a {
    color: #e74c3c;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}
    </style>
<form action="/update" method="post">
<input type="text" name="name" value="{{ customers[1] }}">
<input type="email" name="email" value="{{ customers[2] }}">
<input type="number" name="phone" value="{{ customers[3] }}">
<input type="text" name="notes" value="{{ customers[4] }}">
<input type="hidden" name="id" value="{{ customers[0] }}">
<button type="submit">UPDATE CUSTOMER</button>
</form>
